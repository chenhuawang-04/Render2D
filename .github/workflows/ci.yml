name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      engine_deps_root:
        description: "Optional local root holding the four engine dep trees. Leave empty to fetch them from git (the default)."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Portable tier: architecture-invariant guardrails that need no engine
  # dependencies, no Vulkan SDK, no GPU, and no build. Runs on free hosted
  # runners for every push to main/master and every pull request.
  # ---------------------------------------------------------------------------
  portable-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Constraint scan (std::vector / Vulkan memory API / local math)
        run: bash scripts/scan_constraints.sh

      - name: Merge-conflict marker scan
        run: |
          if git grep -nI -E '^(<<<<<<<|>>>>>>>)( |$)' -- ':(exclude)third_party'; then
            echo "::error::merge conflict markers found"
            exit 1
          fi
          echo "no conflict markers"

      - name: Validate CMakePresets.json
        run: python3 -c "import json; json.load(open('CMakePresets.json')); print('CMakePresets.json is valid JSON')"

  # ---------------------------------------------------------------------------
  # Full tier: configure -> build -> ctest (Debug + Perf) -> clang-tidy ->
  # constraint scan -> bench smoke, on a HOSTED runner. Render2D's CMake fetches
  # the four engine deps from git (reuse/local/fetch tiers); all four repos are
  # public, so this job needs only a toolchain it can install: clang + Ninja and
  # the Vulkan loader + headers -- no secret. No GPU is present, so the vulkan_*
  # smokes skip: the build is green but GPU paths are NOT exercised on hosted (a
  # real-device pass is a local / self-hosted-runner follow-up). Runs on
  # main/master pushes and on demand; set the engine_deps_root input to use a
  # pre-staged local checkout instead of fetching.
  # ---------------------------------------------------------------------------
  full-build:
    # Auto-gate on integration pushes (main/master) + on demand; skipped on PRs
    # (portable-checks gates those) to bound hosted-runner cost. The four engine
    # deps are public, so this needs no secret.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps-cache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain (clang 22, ninja)
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all
          sudo apt-get install -y ninja-build
          # The steps below call the versioned clang-22 / clang++-22 / clang-tidy-22
          # binaries directly (ubuntu-latest's default clang is older).

      - name: Install Vulkan loader + headers + validation layers
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev vulkan-validationlayers

      - name: Configure git credentials (optional; engine deps are public)
        env:
          ENGINE_DEPS_TOKEN: ${{ secrets.ENGINE_DEPS_TOKEN }}
        run: |
          # All four engine deps are public, so no token is required. The optional
          # rewrite is kept only so a fork that re-privatises a dep can still fetch.
          if [ -n "$ENGINE_DEPS_TOKEN" ]; then
            git config --global url."https://x-access-token:${ENGINE_DEPS_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "optional credential rewrite configured for github.com"
          else
            echo "no ENGINE_DEPS_TOKEN set -- fine, the four engine deps are public"
          fi

      - name: Cache fetched engine dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.deps-cache
          key: engine-deps-${{ hashFiles('CMakeLists.txt', 'cmake/Render2DDependencies.cmake', '.gitmodules') }}
          restore-keys: engine-deps-

      - name: Resolve engine-deps root (local override vs fetch)
        run: |
          ROOT="${{ github.event.inputs.engine_deps_root }}"
          # Empty input -> point at a path with no dep trees so all four fetch.
          if [ -z "$ROOT" ]; then ROOT="$GITHUB_WORKSPACE/.no-local-engine-deps"; fi
          echo "ENGINE_DEPS_ROOT=$ROOT" >> "$GITHUB_ENV"

      - name: Configure (Debug)
        run: >
          cmake --preset clang-ninja-debug
          -DCMAKE_C_COMPILER=clang-22 -DCMAKE_CXX_COMPILER=clang++-22
          -DRENDER2D_ENGINE_DEPS_ROOT="$ENGINE_DEPS_ROOT"
          -DFETCHCONTENT_BASE_DIR="$FETCHCONTENT_BASE_DIR"
      - name: Build (Debug)
        run: cmake --build --preset clang-ninja-debug
      - name: Test (Debug)
        run: ctest --preset clang-ninja-debug

      - name: Configure (Perf)
        run: >
          cmake --preset clang-ninja-perf
          -DCMAKE_C_COMPILER=clang-22 -DCMAKE_CXX_COMPILER=clang++-22
          -DRENDER2D_ENGINE_DEPS_ROOT="$ENGINE_DEPS_ROOT"
          -DFETCHCONTENT_BASE_DIR="$FETCHCONTENT_BASE_DIR"
      - name: Build (Perf)
        run: cmake --build --preset clang-ninja-perf
      - name: Test (Perf)
        run: ctest --preset clang-ninja-perf

      - name: clang-tidy (config + representative TU)
        run: |
          clang-tidy-22 --verify-config --config-file=.clang-tidy
          clang-tidy-22 -p build --quiet tests/compile_smoke.cpp

      - name: Constraint scan
        run: bash scripts/scan_constraints.sh

      - name: Benchmark smoke
        run: |
          bench_bin="$(ls build_perf/bench/render2d_null_cpu_bench* 2>/dev/null | head -1)"
          if [ -z "$bench_bin" ]; then
            echo "::error::null_cpu bench binary not found under build_perf/bench"
            exit 1
          fi
          "$bench_bin" --scenario mixed --sprites 256 --texts 64 --frames 2 --warmup 1
